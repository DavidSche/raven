<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Detection System - Web Viewer</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Human Detection System</h1>
            <div class="status-bar">
                <span class="status-item">
                    <span class="status-label">连接状态:</span>
                    <span id="connection-status" class="status-value disconnected">未连接</span>
                </span>
                <span class="status-item">
                    <span class="status-label">FPS:</span>
                    <span id="fps-value" class="status-value">0</span>
                </span>
                <span class="status-item">
                    <span class="status-label">检测目标:</span>
                    <span id="detection-count" class="status-value">0</span>
                </span>
            </div>
        </header>

        <main class="main-content">
            <div class="video-container">
                <canvas id="detection-canvas"></canvas>
                <div id="loading-overlay" class="loading-overlay">
                    <div class="spinner"></div>
                    <p>正在连接服务器...</p>
                </div>
                <div id="error-overlay" class="error-overlay" style="display: none;">
                    <p id="error-message">连接失败</p>
                    <button id="reconnect-btn" class="btn-reconnect">重新连接</button>
                </div>
            </div>

            <aside class="sidebar">
                <div class="panel">
                    <h3>连接设置</h3>
                    <div class="form-group">
                        <label for="ws-url">WebSocket URL:</label>
                        <input type="text" id="ws-url" value="ws://localhost:8000/ws/results" placeholder="ws://localhost:8000/ws/results">
                    </div>
                    <div class="form-group">
                        <label for="video-width">视频宽度:</label>
                        <input type="number" id="video-width" value="1280" min="320" max="3840">
                    </div>
                    <div class="form-group">
                        <label for="video-height">视频高度:</label>
                        <input type="number" id="video-height" value="720" min="240" max="2160">
                    </div>
                    <div class="btn-group">
                        <button id="connect-btn" class="btn-primary">连接</button>
                        <button id="disconnect-btn" class="btn-secondary" disabled>断开</button>
                    </div>
                </div>

                <div class="panel">
                    <h3>检测统计</h3>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <span class="stat-label">活体目标</span>
                            <span id="live-count" class="stat-value live">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">扫描中</span>
                            <span id="scan-count" class="stat-value scan">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">总帧数</span>
                            <span id="frame-count" class="stat-value">0</span>
                        </div>
                    </div>
                </div>

                <div class="panel">
                    <h3>目标列表</h3>
                    <div id="target-list" class="target-list">
                        <p class="no-targets">暂无检测目标</p>
                    </div>
                </div>
            </aside>
        </main>

        <footer class="footer">
            <p>Human Detection System v2.0 | WebSocket Real-time Viewer</p>
        </footer>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
